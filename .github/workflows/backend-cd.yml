name: Backend CD

on:
  push:
    branches: [main, master]
    paths:
      - 'src/ChatApi/**'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  BACKEND_PATH: src/ChatApi
  IMAGE_NAME: chatapi
  IMAGE_TAG: ${{ github.sha }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.BACKEND_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ChatApi.sln

      - name: Build
        run: dotnet build ChatApi.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ChatApi.sln --no-build --configuration Release --verbosity normal

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_PATH }}
          file: ${{ env.BACKEND_PATH }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
