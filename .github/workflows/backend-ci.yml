name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/ChatApi/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/ChatApi/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/ChatApi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ChatApi.sln

      - name: Build
        run: dotnet build ChatApi.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ChatApi.sln --no-build --configuration Release --verbosity normal
